services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://localhost:19092
    ports:
      - "19092:19092"
      - "19644:9644"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    environment:
      DATABASE_PATH: /data/ai-journey-dj.db
      KAFKA_BROKERS: redpanda:19092
    ports:
      - "3000:3000"
    volumes:
      - api-data:/data
    depends_on:
      - redpanda

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  api-data:
