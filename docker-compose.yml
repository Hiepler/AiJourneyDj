services:
  mosquitto:
    image: eclipse-mosquitto:2
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  vehicle-command:
    image: tesla/vehicle-command:latest
    profiles:
      - telemetry
    environment:
      TESLA_HTTP_PROXY_TLS_CERT: /config/tls-cert.pem
      TESLA_HTTP_PROXY_TLS_KEY: /config/tls-key.pem
      TESLA_HTTP_PROXY_HOST: 0.0.0.0
      TESLA_HTTP_PROXY_PORT: "4444"
      TESLA_HTTP_PROXY_TIMEOUT: 10s
      TESLA_KEY_FILE: /config/fleet-key.pem
      TESLA_VERBOSE: "true"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:4444:4444"
    volumes:
      - ./docker/tesla/vehicle-command:/config:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    environment:
      DATABASE_PATH: /data/ai-journey-dj.db
      MQTT_URL: mqtt://mosquitto:1883
      TESLA_COMMAND_PROXY_URL: https://vehicle-command:4444
    ports:
      - "3000:3000"
    volumes:
      - api-data:/data
    depends_on:
      - mosquitto

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  api-data:
